new-session 1
new-window -c /home/tn/code/c/termbudget/src -n C/TERMBUDGET -t 2
new-window -c /home/tn/code/c/c-practice -n C/PRACTICE -t 3
new-window -c /home/tn -n LINUX -t 4
new-window -c /home/tn/code/python -n PYTHON -t 5
kill-window -t 0
new-window -c /home/tn/code/c/termbudget -n SCRATCHPAD -t 0

set -g default-terminal "tmux-256color"
set -g xterm-keys on
set-option -g focus-events on
set-option -g escape-time 50
set-option -sa terminal-features ',xterm-256color:RGB'
#set -g base-index 1 # start windows numbering at 1

#set -g status-style fg="#949494"
#set -g window-status-current-style fg="#e3c78a"
#set -g pane-border-style fg="#323437"
#set -g pane-active-border-style fg="#323437"

bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U
bind ^x resize-pane -x 25%
bind ^y resize-pane -y 25%
bind '=' resize-pane -x 50%
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Set status line, windows, pane and message colors.
set -g message-style "bg=#1c1c1c,fg=#9c9c9c"
set -g pane-active-border-style "bg=#080808,fg=#80a0ff"
set -g pane-border-style "bg=#080808,fg=#303030"

set -g status-style "bg=#0a0a0b,fg=#9c9c9c"
#set -g status-style "bg=#1c1c1c,fg=#ecc48d"

setw -g window-status-activity-style none

#setw -g window-status-current-style "bg=#353946,fg=#80a0ff"
setw -g window-status-current-style "bg=#353946,fg=#87a7f3"
